    decision: |
      send/reply/read migrated from FIFO/queue/log to the thread primitive (D74) via clean-jump (D76). Per-pair thread IDs (pair-<a>-<b>, sorted/symmetric) and per-chat IDs (chat-<id>) provide deterministic routing; ensure_thread is idempotent and extends participants when new senders join. The manager's stdout_to_log thread tees assistant responses with stop_reason=end_turn to the active thread (runtime/active-thread tracks the most recent inbound thread, updated by check_thread_changes on successful FIFO writes). check_thread_changes gained a `seeded` flag so the manager's startup-time pre-seed doesn't get absorbed as "first scan, no diff" — fixes a genuine delivery race where writes landing before the first 5s poll were silently dropped. `read --log` retains raw log access. `read` auto-detects the pair thread and silently falls back to the log when no saved cwd exists (tests, fresh workers). Phase 2 notifications remain lightweight (P12, OBS4) — full content read on demand via thread read.

      start accepts --identity <name> that reads identity prompt from ~/.cwork/identities/<name>/identity.md (user-installed) or falls back to bundled identities for pm and technical-lead. --pm and --team-lead are backwards-compat aliases. Session metadata stores identity: "<name>" alongside legacy pm/team_lead booleans. _get_worker_identity reads the new field with fallback to legacy. ls shows [<LABEL>] using a label map (pm→PM, technical-lead→TL, custom identities show uppercased name).

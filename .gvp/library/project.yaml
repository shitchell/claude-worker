    decision: |
      PM operates in two modes via CC native scheduling. Mode 1 (continuous work): ScheduleWakeup for adaptive pacing through the backlog (60-270s intervals, cache-aware). Mode 2 (periodic review): CronCreate with durable=true for daily wake-ups (47 8 * * *). Stable state = ideas triaged + tickets actioned + blockers reported. Supersedes D42 (homegrown periodic tasks) and D44 (off-hours cron shell script). CronCreate durable tasks persist across --resume via per-project .claude/scheduled_tasks.json.
    origin: |
      Ticket #064 (2026-04-13). PM needed autonomous work loop without human nudges. CC native scheduling (ScheduleWakeup, CronCreate) replaces homegrown periodic task system.

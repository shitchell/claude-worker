observations:
  - id: OBS1
    name: mid-turn-intervention-only-via-posttooluse-exit-2
    description: |
      The ONLY mechanism for mid-turn agent communication is PostToolUse hooks exiting with code 2 + stderr message. This produces a blocking error shown to the agent mid-turn. No signal gracefully interrupts a turn in -p mode — SIGUSR1 has no effect, SIGUSR2 and SIGINT both kill the session. Use PostToolUse exit 2 sparingly: only for critical thresholds (context >85%) where waiting for turn end risks compaction. Non-critical warnings should use Stop hooks (between turns). Confirmed via live signal testing (2026-04-10, ticket #048).
  - id: D54
    name: compaction-resilience-immediate-phase
    decision: |
      Immediate compaction resilience implementation: (1) context warnings at 50%/65%/80% via Stop hook with per-threshold sentinels. 50% = delegation reminder, 65% = wrap-up recommendation, 80% = begin wrap-up. (2) Enhanced compaction detector: logs to .cwork/<identity>/LOG.md, fires claude-worker notify, notes analyze-session/wrap-up were skipped. (3) Identity re-injector: full identity.md + ticket summary + GVP count on compact/clear events; lighter summary on startup/resume. No truncation.
    origin: |
      Ticket #048 immediate phase (2026-04-10). Prevention + detection + recovery layered approach approved by human.
    tags:
      - context
      - observability
    maps_to:
      - project:P10
      - project:V6
      - project:G2
    refs:
      - file: claude_worker/context_threshold.py
        identifier: THRESHOLDS
        role: implements

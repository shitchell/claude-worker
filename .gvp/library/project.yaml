    decision: |
      REPL accepts --continuous (-c) for tail-f style output with on-demand input. Messages flow continuously; pressing any key activates the readline prompt. After submit, returns to flow. Uses raw terminal mode (termios/tty) + threading, no external deps. Terminal state restored via try/finally. Default REPL behavior unchanged — --continuous is opt-in.

      debugging:
        description: Debugging process and diagnostics
      delegation:
        description: Work delegation to sub-workers or agents
      dry:
        description: Don't Repeat Yourself principle
      durability:
        description: Crash safety and data persistence
      efficiency:
        description: Performance and resource usage
      fifo:
        description: Named FIFO plumbing and IPC
      gitignore:
        description: Version control exclusion decisions

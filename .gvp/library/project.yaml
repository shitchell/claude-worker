    name: send-broadcast-with-filter-flags
    decision: |
      send --broadcast sends a message to all workers matching filter flags (--role, --status, --alive, --cwd). Reuses the filter logic from cmd_list via _collect_filtered_workers. Fire-and- forget by default (skips status gate, writes to each FIFO without waiting). --show-response waits for each target sequentially. Self-exclusion via _find_worker_by_ancestry. Core send logic extracted to _send_to_single_worker for reuse.
